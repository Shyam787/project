apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-prometheus
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-rag-prometheus
  template:
    metadata:
      labels:
        app: enterprise-rag-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-rag-prometheus
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app: enterprise-rag-prometheus
  ports:
    - port: 9090
      targetPort: 9090
