apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-keycloak
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-rag-keycloak
  template:
    metadata:
      labels:
        app: enterprise-rag-keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          args: ["start"]
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: enterprise-rag-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-rag-keycloak
  namespace: auth
spec:
  type: ClusterIP
  selector:
    app: enterprise-rag-keycloak
  ports:
    - port: 8080
      targetPort: 8080
