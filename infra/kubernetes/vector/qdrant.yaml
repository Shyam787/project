apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: enterprise-rag-qdrant
  namespace: vector
spec:
  serviceName: enterprise-rag-qdrant
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-rag-qdrant
  template:
    metadata:
      labels:
        app: enterprise-rag-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.9.7
          ports:
            - containerPort: 6333
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-rag-qdrant
  namespace: vector
spec:
  type: ClusterIP
  selector:
    app: enterprise-rag-qdrant
  ports:
    - port: 6333
      targetPort: 6333
