apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-frontend
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-rag-frontend
  template:
    metadata:
      labels:
        app: enterprise-rag-frontend
    spec:
      containers:
        - name: frontend
          image: enterprise-rag/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: /api
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-rag-frontend
  namespace: app
spec:
  type: ClusterIP
  selector:
    app: enterprise-rag-frontend
  ports:
    - port: 3000
      targetPort: 3000
