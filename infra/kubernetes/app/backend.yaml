apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-rag-backend
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-rag-backend
  template:
    metadata:
      labels:
        app: enterprise-rag-backend
    spec:
      containers:
        - name: backend
          image: enterprise-rag/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: enterprise-rag-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-rag-backend
  namespace: app
spec:
  type: ClusterIP
  selector:
    app: enterprise-rag-backend
  ports:
    - port: 8000
      targetPort: 8000
